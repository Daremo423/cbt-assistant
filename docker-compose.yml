version: '3.8'

services:
  cbt-assistant:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      # Secrets should be passed via environment variables or .env file
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
    volumes:
      # Mount the server directory for development (optional, remove for production)
      - ./server:/app/server
      # Persist potential logs or data if needed
      - cbt-data:/app/data

volumes:
  cbt-data:
